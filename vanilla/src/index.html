<script>
  // Create the spinner element
  const spinner = document.createElement('div');
  spinner.id = 'spinner';

  // Apply styles to the spinner
  spinner.style.border = '4px solid #f3f3f3';  // Light grey background
  spinner.style.borderTop = '4px solid #3498db';  // Blue color for the spinner
  spinner.style.borderRadius = '50%';  // Make it circular
  spinner.style.width = '30px';  // Size of the spinner
  spinner.style.height = '30px';  // Size of the spinner
  spinner.style.animation = 'spin 1s linear infinite';  // Apply spinning animation

  // Append the spinner to the body of the document
  document.body.appendChild(spinner);

  // Add the spinning keyframes animation to the document's head
  const style = document.createElement('style');
  style.innerHTML = `
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  `;
  document.head.appendChild(style);

</script>
